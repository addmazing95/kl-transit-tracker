# Docker version of KL Transit Tracker.
# The local venv-based workflow in the README still works exactly the same.
#
# Quick start:
#   docker compose up --build
#   # then open http://localhost:5173
#
# Backend bootstraps GTFS static data on first run, persists everything to
# the ./data/ folder via a bind mount so it survives container restarts.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: kl-transit-tracker-backend:local
    container_name: klt-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      LOG_LEVEL: INFO
      TIMEZONE: Asia/Kuala_Lumpur
      DATABASE_URL: sqlite:////data/transit.db
      GTFS_CACHE_DIR: /data/gtfs_cache
      POLL_INTERVAL_SECONDS: "20"
      NEWS_SCRAPE_INTERVAL_MINUTES: "15"
      RAPID_RAIL_LIVE: "false"
      # Allow any origin: this is a self-hosted dashboard with no auth and only
      # public-data endpoints, so locking down CORS adds friction without value.
      CORS_ORIGINS: "*"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Leave these unset so the bundle derives the backend URL from
        # window.location at runtime. The same image then works on localhost,
        # a cloud VM, Codespaces, or Play with Docker without rebuilding.
        # Override here only if backend lives on a different host:
        # VITE_API_BASE: https://api.example.com
        # VITE_WS_BASE: wss://api.example.com
    image: kl-transit-tracker-frontend:local
    container_name: klt-frontend
    restart: unless-stopped
    ports:
      # Use 5173 to match the existing CORS allowlist in the backend code.
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
