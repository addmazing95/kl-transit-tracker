server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed asset bundles, short for the HTML shell.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Small responses, gzip helps a lot.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
}
